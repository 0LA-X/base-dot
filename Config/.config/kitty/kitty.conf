# BEGIN_KITTY_FONTS
font_family      family="CaskaydiaCove Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 15.5

# Use z-shell
shell zsh

# Kitty Theme
include ./themes/gruvbox_dark.conf
background_opacity 0.90
window_padding_width 5
disable_ligatures never

# Cursor  # block / beam / underline #39ff14 #00CCFF #ff33cc #000000 #FF073A
cursor #39FF14
cursor_text_color  #000000
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0.5
shell_integration no-cursor

# -- -- -- --
# cursor_trail 1
# cursor_trail_start_threshold 1
# cursor_stop_blinking_after 15.0
# cursor_trail_decay 0.3 0.6
# shell_integration no-cursor
# -- -- -- --


# 🚀 CURSOR TRAIL (The "Neovide" effect)
cursor_trail 10
cursor_trail_decay 0.15 0.4
cursor_trail_start_threshold 2

# Shell integration configuration
shell_integration no-cursor


# ================================
#   📑 TABS (Powerline Style)
# ================================
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_activity_symbol ⚡

# Font styles for tabs
active_tab_font_style   bold
inactive_tab_font_style normal

# ==========
#   MISC
# ==========
allow_remote_control yes
allow_hyperlinks yes
underline_hyperlinks hover

copy_on_select yes

confirm_os_window_close 0
hide_window_decorations yes
enable_audio_bell yes

# -- Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
